# Application Configuration
quarkus.application.name=veloforge-back
quarkus.http.port=8080
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173
quarkus.http.cors.methods=GET,PUT,POST,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=24H

# MongoDB Configuration
%prod.quarkus.mongodb.connection-string=mongodb://admin:password@localhost:27017/veloforge?authSource=admin
quarkus.mongodb.database=veloforge

# Redis Configuration
%prod.quarkus.redis.hosts=redis://localhost:6379

# Redpanda Configuration (Kafka-compatible)
%prod.kafka.bootstrap.servers=localhost:19092
mp.messaging.outgoing.cyclist-positions.connector=smallrye-kafka
mp.messaging.outgoing.cyclist-positions.topic=cyclist.position.updated
mp.messaging.outgoing.cyclist-positions.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.cyclist-positions.value.serializer=io.quarkus.kafka.client.serialization.JsonbSerializer

mp.messaging.outgoing.leaderboard-updates.connector=smallrye-kafka
mp.messaging.outgoing.leaderboard-updates.topic=event.leaderboard.updated
mp.messaging.outgoing.leaderboard-updates.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.leaderboard-updates.value.serializer=io.quarkus.kafka.client.serialization.JsonbSerializer

# OpenAPI Configuration
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Health Check Configuration
quarkus.smallrye-health.root-path=/health

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."com.veloforge".level=DEBUG

# Development Configuration
%dev.quarkus.log.console.enable=true
%dev.quarkus.log.console.level=DEBUG
%dev.quarkus.console.color=true

# Native Configuration
quarkus.native.resources.includes=**/*.json

# Simulation Configuration
veloforge.simulation.update-interval=30s
veloforge.simulation.physics.gravity=9.81
veloforge.simulation.physics.air-density=1.225
veloforge.simulation.physics.rolling-coefficient=0.005