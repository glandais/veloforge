version: 2
updates:
  # Maven dependencies (Backend)
  - package-ecosystem: "maven"
    directory: "/veloforge-back"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    reviewers:
      - "glandais"
    assignees:
      - "glandais"
    commit-message:
      prefix: "deps(maven)"
      include: "scope"
    labels:
      - "dependencies"
      - "backend"
      - "maven"
    groups:
      # Group all minor and patch updates together
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # npm dependencies (Frontend)
  - package-ecosystem: "npm"
    directory: "/veloforge-front"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    reviewers:
      - "glandais"
    assignees:
      - "glandais"
    commit-message:
      prefix: "deps(npm)"
      include: "scope"
    labels:
      - "dependencies"
      - "frontend"
      - "npm"
    groups:
      # Group all minor and patch updates together
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # npm dependencies (root)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    reviewers:
      - "glandais"
    assignees:
      - "glandais"
    commit-message:
      prefix: "deps(npm)"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    groups:
      # Group all minor and patch updates together
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Docker dependencies (Frontend)
  - package-ecosystem: "docker"
    directory: "/veloforge-front"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:30"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    reviewers:
      - "glandais"
    assignees:
      - "glandais"
    commit-message:
      prefix: "deps(docker-frontend)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
      - "frontend"
    groups:
      # Group all minor and patch updates together
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Docker Compose dependencies
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "10:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    reviewers:
      - "glandais"
    assignees:
      - "glandais"
    commit-message:
      prefix: "deps(docker-compose)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker-compose"
      - "infrastructure"
    groups:
      # Group all minor and patch updates together
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    reviewers:
      - "glandais"
    assignees:
      - "glandais"
    commit-message:
      prefix: "deps(actions)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci-cd"
    groups:
      # Group all minor and patch updates together
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
