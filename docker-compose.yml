version: '3.8'

services:
  mongodb:
    image: mongo:8
    container_name: veloforge-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: veloforge
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - veloforge-network

  redis:
    image: redis:8-alpine
    container_name: veloforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - veloforge-network

  redpanda:
    image: redpandadata/redpanda:v25.2.3
    container_name: veloforge-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --memory 1G
      - --reserve-memory 200M
      - --overprovisioned
      - --set redpanda.auto_create_topics_enabled=true
    ports:
      - "18081:18081"  # Schema Registry
      - "18082:18082"  # HTTP Proxy (Pandaproxy)
      - "19092:19092"  # Kafka API
      - "19644:9644"   # Prometheus metrics
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - veloforge-network
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Development tools
  mongo-express:
    image: mongo-express:1-18
    container_name: veloforge-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb
    networks:
      - veloforge-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: veloforge-redis-commander
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    networks:
      - veloforge-network

  redpanda-console:
    image: redpandadata/console:v2.8.0
    container_name: veloforge-redpanda-console
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
          schemaRegistry:
            enabled: true
            urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    depends_on:
      - redpanda
    networks:
      - veloforge-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  redpanda_data:
    driver: local

networks:
  veloforge-network:
    driver: bridge